<!DOCTYPE html>
<html>
<head>
    <title>Booking History</title>

    <style>
        body{
            font-family: 'Segoe UI', sans-serif;
            background:#f5f7fa;
            text-align:center;
        }

        h1{
            margin-top:40px;
        }

        table{
            width:80%;
            margin:30px auto;
            border-collapse:collapse;
            background:white;
            box-shadow:0px 5px 15px rgba(0,0,0,0.1);
        }

        th, td{
            padding:12px;
            border-bottom:1px solid #ddd;
        }

        th{
            background:#0284c7;
            color:white;
        }

        tr:hover{
            background:#f1f5f9;
        }

        a{
            display:inline-block;
            margin-top:20px;
            text-decoration:none;
            color:#0284c7;
        }
        .success-msg{
            background:#22c55e;
            color:white;
            padding:12px;
            border-radius:8px;
            margin-bottom:15px;
            text-align:center;
            font-weight:500;
        }
    </style>
</head>

<body>
{% if messages %}
    {% for message in messages %}
        <div class="success-msg">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
<h1>Booking History</h1>

<table>
    <tr>
        <th>Name</th>
        <th>Date</th>
        <th>Time</th>
    </tr>

    {% for booking in bookings %}
    <tr>
        <td>{{ booking.name }}</td>
        <td>{{ booking.date }}</td>
        <td>{{ booking.time }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">No bookings yet</td>
    </tr>
    {% endfor %}
</table>

<a href="/">← Back to Home</a>

</body>
</html>
